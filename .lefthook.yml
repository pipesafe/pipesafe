pre-commit:
  parallel: true
  commands:
    build:
      run: bun run build
      stage_fixed: true
    lint:
      run: bun run lint:fix
      stage_fixed: true
    format:
      run: bun run format:fix
      stage_fixed: true
    test:
      run: bun run test:ci
      stage_fixed: true

# The assertion regression net (two full tsc passes) runs before anything
# leaves the machine rather than on every commit — CI enforces it too.
# Manifold type-checks against core's dist, which pre-commit's build keeps
# fresh.
pre-push:
  commands:
    typecheck-packages:
      run: bun run typecheck:packages
