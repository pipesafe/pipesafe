# Runs sequentially (piped) with build FIRST: the pipesafe/no-impure-function-body
# lint rule loads from core's built dist and eslint.config.js skips it when dist is
# stale/absent, so linting before building would silently drop the rule. `priority`
# pins the order and `piped` stops at the first failure. (Sequential also avoids two
# tsdown builds racing on dist.)
pre-commit:
  piped: true
  commands:
    build:
      priority: 1
      run: bun run build
      stage_fixed: true
    lint:
      priority: 2
      run: bun run lint:fix
      stage_fixed: true
    format:
      priority: 3
      run: bun run format:fix
      stage_fixed: true
    test:
      priority: 4
      run: bun run test:ci
      stage_fixed: true

# The assertion regression net (two full tsc passes) runs before anything
# leaves the machine rather than on every commit — CI enforces it too.
# The build is part of the hook: manifold type-checks against core's dist,
# and pushes from fresh clones / after rebase / after --no-verify commits
# cannot rely on a pre-commit build having run (stale dist = false result).
pre-push:
  commands:
    typecheck-packages:
      run: bun run build && bun run typecheck:packages
