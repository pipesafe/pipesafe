pre-commit:
  jobs:
    - name: format-lint-build
      group:
        parallel: true
        jobs:
          - run: bun run build
            stage_fixed: true
          - run: bun run lint:fix
            stage_fixed: true
          - run: bun run format:fix
            stage_fixed: true
    - name: test
      run: bun run test:ci
      stage_fixed: true
