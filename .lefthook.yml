pre-commit:
  parallel: true
  commands:
    build:
      # typecheck:packages runs after the build on purpose: manifold
      # type-checks against core's built dist, and this is the only hook
      # that validates the *.typeAssertions.ts regression net (neither the
      # root typecheck nor tsdown re-checks package sources).
      run: bun run build && bun run typecheck:packages
      stage_fixed: true
    lint:
      run: bun run lint:fix
      stage_fixed: true
    format:
      run: bun run format:fix
      stage_fixed: true
    test:
      run: bun run test:ci
      stage_fixed: true
