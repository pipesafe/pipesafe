pre-commit:
  parallel: true
  commands:
    build:
      run: bun run build
      stage_fixed: true
    lint:
      run: bun run lint:fix
      stage_fixed: true
    format:
      run: bun run format:fix
      stage_fixed: true
    test:
      run: bun run test:ci
      stage_fixed: true

# The assertion regression net (a full tsc pass per package) runs before
# anything leaves the machine rather than on every commit — CI enforces it
# too. The build is part of the hook: manifold/infra/intake type-check
# against their siblings' dist, and pushes from fresh clones / after rebase
# / after --no-verify commits cannot rely on a pre-commit build having run
# (stale dist = false result).
pre-push:
  commands:
    typecheck-packages:
      run: bun run build && bun run typecheck:packages
